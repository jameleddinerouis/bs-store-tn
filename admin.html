<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS Store - Panel Admin</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0d0d0d;
            color: #00ff00;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- ÉCRAN DE CONNEXION --- */
        #login-screen {
            text-align: center;
            background-color: #1a1a1a;
            padding: 40px;
            border: 2px solid #00ff00;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        #login-screen h2 {
            margin-top: 0;
            text-transform: uppercase;
        }
        input[type="password"] {
            background-color: black;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px;
            font-size: 1.5rem;
            text-align: center;
            width: 200px;
            margin-bottom: 20px;
            font-family: 'Courier New', Courier, monospace;
        }
        button {
            background-color: #00ff00;
            color: black;
            border: none;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Courier New', Courier, monospace;
        }
        button:hover { background-color: #00cc00; }

        /* --- TABLEAU DE BORD --- */
        #dashboard {
            display: none;
            width: 90%;
            max-width: 1000px;
        }
        .header-admin {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00ff00;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .header-admin h1 { margin: 0; }
        .logout-btn { background-color: red; color: white; }
        .logout-btn:hover { background-color: darkred; }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .stat-card {
            background-color: #1a1a1a;
            border: 1px solid #00ff00;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.1);
        }
        .stat-title {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 5px #00ff00;
        }
        .stat-sub { font-size: 0.9rem; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- Écran de connexion -->
    <div id="login-screen">
        <h2>🔒 ACCÈS RESTREINT</h2>
        <input type="password" id="pin-input" placeholder="Code secret" maxlength="6">
        <br>
        <button onclick="verifierCode()">Connexion</button>
        <p id="error-msg" style="color: red; display: none;">Accès refusé.</p>
    </div>

    <!-- Tableau de bord -->
    <div id="dashboard">
        <div class="header-admin">
            <h1>💻 BS Store - Panel Admin</h1>
            <button class="logout-btn" onclick="location.reload()">Déconnexion</button>
        </div>

        <div class="grid-stats">
            <!-- Widget Argent -->
            <div class="stat-card">
                <div class="stat-title">Revenus (15 derniers jours)</div>
                <div class="stat-value" id="revenue-val">-- DT</div>
                <div class="stat-sub">Objectif cycle: 600 DT</div>
            </div>

            <!-- Widget Visites (Persistant) -->
            <div class="stat-card">
                <div class="stat-title">Visiteurs Aujourd'hui</div>
                <div class="stat-value" id="visitors-val" style="color: cyan; text-shadow: 0 0 5px cyan;">--</div>
                <div class="stat-sub">Depuis 8h00 du matin</div>
            </div>

            <!-- Widget Commandes -->
            <div class="stat-card">
                <div class="stat-title">Commandes en attente</div>
                <div class="stat-value" id="orders-val" style="color: orange; text-shadow: 0 0 5px orange;">--</div>
                <div class="stat-sub">Vérifiez Discord !</div>
            </div>

            <!-- Widget Serveur -->
            <div class="stat-card">
                <div class="stat-title">Statut API Flouci</div>
                <div class="stat-value" style="color: #00ff00;">ONLINE</div>
                <div class="stat-sub">Connexion sécurisée</div>
            </div>
        </div>
    </div>

    <script>
        /* =========================================
           PROTECTION ANTI-INSPECTEUR
           ========================================= */
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };

        /* =========================================
           CONNEXION SECRÈTE (270511 = MjcwNTEx)
           ========================================= */
        function verifierCode() {
            let input = document.getElementById('pin-input').value;
            if (btoa(input) === "MjcwNTEx") {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('dashboard').style.display = "block";
                chargerStatistiques();
            } else {
                document.getElementById('error-msg').style.display = "block";
                document.getElementById('pin-input').value = "";
            }
        }

        document.getElementById("pin-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") { event.preventDefault(); verifierCode(); }
        });

        /* =========================================
           GÉNÉRATION INTELLIGENTE ET PERSISTANTE
           ========================================= */
        function chargerStatistiques() {
            let now = new Date();
            let todayMidnight = new Date();
            todayMidnight.setHours(0,0,0,0);
            let timeTodayMidnight = todayMidnight.getTime();

            // ----------------------------------------------------
            // 1. CALCUL DE L'ARGENT (Même logique qu'avant)
            // ----------------------------------------------------
            let dateDebut = localStorage.getItem('bs_start_date');
            let revenuActuel = localStorage.getItem('bs_revenue');
            let derniereMajArgent = localStorage.getItem('bs_last_update');

            if (!dateDebut) {
                dateDebut = timeTodayMidnight;
                revenuActuel = 15;
                derniereMajArgent = timeTodayMidnight;
                localStorage.setItem('bs_start_date', dateDebut);
                localStorage.setItem('bs_revenue', revenuActuel);
                localStorage.setItem('bs_last_update', derniereMajArgent);
            } else {
                dateDebut = parseInt(dateDebut);
                revenuActuel = parseInt(revenuActuel);
                derniereMajArgent = parseInt(derniereMajArgent);

                let joursDepuisDebut = Math.floor((timeTodayMidnight - dateDebut) / (1000 * 3600 * 24));
                let joursDepuisDerniereMaj = Math.floor((timeTodayMidnight - derniereMajArgent) / (1000 * 3600 * 24));

                if (joursDepuisDebut >= 15) {
                    dateDebut = timeTodayMidnight;
                    revenuActuel = 15;
                    derniereMajArgent = timeTodayMidnight;
                    localStorage.setItem('bs_start_date', dateDebut);
                } else if (joursDepuisDerniereMaj > 0) {
                    for(let i=0; i<joursDepuisDerniereMaj; i++) {
                        revenuActuel += Math.floor(Math.random() * (75 - 10 + 1)) + 10;
                    }
                    derniereMajArgent = timeTodayMidnight;
                    localStorage.setItem('bs_last_update', derniereMajArgent);
                }
                localStorage.setItem('bs_revenue', revenuActuel);
            }
            document.getElementById('revenue-val').innerText = revenuActuel + " DT";

            // ----------------------------------------------------
            // 2. CALCUL DES VISITEURS (Heure par Heure)
            // ----------------------------------------------------
            let currentHour = now.getHours();
            
            // On enregistre le jour actuel pour réinitialiser les visiteurs à 8h le lendemain
            let recordedDay = localStorage.getItem('bs_visit_day');
            let currentDay = now.getDate();
            
            let visiteursActuels = localStorage.getItem('bs_visitors');
            let derniereHeureCalculee = localStorage.getItem('bs_last_hour_calc');

            // Si on est un nouveau jour, on réinitialise tout (ou si c'est la 1ere fois)
            if (recordedDay != currentDay) {
                visiteursActuels = 0;
                derniereHeureCalculee = 7; // On part du principe qu'avant 8h, c'est l'heure "7"
                localStorage.setItem('bs_visit_day', currentDay);
            } else {
                visiteursActuels = parseInt(visiteursActuels) || 0;
                derniereHeureCalculee = parseInt(derniereHeureCalculee) || 7;
            }

            // Si on est entre 8h et 23h (ou plus tard)
            if (currentHour >= 8) {
                // Combien d'heures sont passées depuis le dernier calcul ?
                let heuresPassees = currentHour - derniereHeureCalculee;
                
                if (heuresPassees > 0) {
                    // Pour chaque heure passée, on ajoute entre 2 et 13 visiteurs
                    for(let i = 0; i < heuresPassees; i++) {
                        visiteursActuels += Math.floor(Math.random() * (13 - 2 + 1)) + 2;
                    }
                    // On met à jour l'heure de la dernière vérification
                    derniereHeureCalculee = currentHour;
                    
                    // On sauvegarde dans le navigateur pour résister au rafraîchissement (F5)
                    localStorage.setItem('bs_visitors', visiteursActuels);
                    localStorage.setItem('bs_last_hour_calc', derniereHeureCalculee);
                }
            } else {
                // S'il n'est pas encore 8h du matin, le compteur reste à 0
                visiteursActuels = 0;
            }

            document.getElementById('visitors-val').innerText = visiteursActuels;

            // ----------------------------------------------------
            // 3. WIDGET COMMANDES (Reste aléatoire à chaque ouverture)
            // ----------------------------------------------------
            document.getElementById('orders-val').innerText = Math.floor(Math.random() * 4);
        }
    </script>
</body>
</html>
