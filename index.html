<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS Store TN - Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bs-blue: #0A56D9;
            --bs-yellow: #FFD000;
            --bs-red: #E63946;
            --bs-dark: #1D1D1D;
        }
        body {
            font-family: 'Lilita One', cursive;
            background-color: var(--bs-blue);
            color: white;
            margin: 0;
            padding: 0;
            background-image: radial-gradient(circle, #1a65e0 10%, transparent 11%), radial-gradient(circle, #1a65e0 10%, transparent 11%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background-color: var(--bs-yellow);
            color: var(--bs-dark);
            text-align: center;
            padding: 20px;
            border-bottom: 6px solid var(--bs-dark);
            text-transform: uppercase;
            font-size: 3rem;
            text-shadow: 2px 2px 0px white;
            letter-spacing: 2px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 40px 20px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }
        h1 {
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 3px 3px 0px var(--bs-dark);
        }
        p.subtitle {
            font-size: 1.8rem;
            margin-top: 10px;
            text-shadow: 2px 2px 0px var(--bs-dark);
        }
        .btn-giant {
            background-color: var(--bs-yellow);
            color: var(--bs-dark);
            text-decoration: none;
            padding: 20px 40px;
            font-size: 2rem;
            border: 5px solid var(--bs-dark);
            border-radius: 15px;
            box-shadow: 6px 6px 0px var(--bs-dark);
            cursor: pointer;
            transition: 0.2s;
            display: inline-block;
            text-transform: uppercase;
            width: 80%;
            max-width: 400px;
        }
        .btn-giant:hover {
            transform: translateY(-5px);
            box-shadow: 8px 8px 0px var(--bs-dark);
        }
        .btn-giant:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--bs-dark);
        }
        .btn-discord {
            background-color: #5865F2;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    ⭐ BS Store TN ⭐
</header>

<div class="container">
    <div>
        <h1>BIENVENUE SUR BS STORE</h1>
        <p class="subtitle">La meilleure boutique Brawl Stars de Tunisie 🇹🇳</p>
    </div>

    <!-- Ce lien mène au fichier offres.html -->
    <a href="offres.html" class="btn-giant">🛒 Voir les offres</a>

    <a href="https://discord.gg/fHKmk36A" target="_blank" class="btn-giant btn-discord">💬 Rejoindre le Discord</a>
</div>

</body>
</html>
